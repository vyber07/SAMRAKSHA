# SAMRAKSHA - Police Crime Monitoring & Case Management Platform
# Unified Backend Services Pipeline: API, database, cache, seed, OSRM, Llama.cpp

services:

  # PostgreSQL Database with PostGIS for geospatial queries
  postgres:
    image: postgis/postgis:16-3.4
    container_name: samraksha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       samraksha
      POSTGRES_USER:     samraksha
      POSTGRES_PASSWORD: samraksha_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samraksha -d samraksha"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Redis Cache for session management and token blacklisting
  redis:
    image: redis:7-alpine
    container_name: samraksha-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auto-seeding container - Automatically populates officers, cases, incidents, patrol units
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samraksha-seed
    command: python scripts/generate_seed_data.py
    environment:
      DATABASE_URL:        postgresql+asyncpg://samraksha:samraksha_secret@postgres:5432/samraksha
      DEMO_SEED_PASSWORD:  password123
      ADMIN_SEED_PASSWORD: password123
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - samraksha-net
    restart: "no"

  # FastAPI Backend - Crime monitoring and case management API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samraksha-api
    restart: unless-stopped
    environment:
      DATABASE_URL:                postgresql+asyncpg://samraksha:samraksha_secret@postgres:5432/samraksha
      REDIS_URL:                   redis://redis:6379/0
      ENVIRONMENT:                 development
      DEMO_MODE:                   "false"
      SECRET_KEY:                  samraksha-super-secret-jwt-key-change-in-prod
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DEMO_SEED_PASSWORD:          password123
      ADMIN_SEED_PASSWORD:         password123
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # React Frontend - Material 3 glass dashboard served by Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samraksha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Llama.cpp Local LLM Server (with fallback entrypoint & healthcheck)
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: samraksha-llamacpp
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /models/model.gguf ]; then
          exec /app/llama-server -m /models/model.gguf --host 0.0.0.0 --port 8080
        elif [ -f /app/main ]; then
          exec /app/main -m /models/model.gguf --host 0.0.0.0 --port 8080
        else
          echo "Warning: /models/model.gguf weight file absent. Starting idle fallback to prevent crash loop."
          sleep infinity
        fi
    volumes:
      - llama_data:/models
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # OSRM Routing Engine (with fallback entrypoint & healthcheck)
  osrm:
    image: osrm/osrm-backend
    container_name: samraksha-osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /data/ahmedabad.osrm ]; then
          exec osrm-routed --algorithm mld /data/ahmedabad.osrm
        else
          echo "Warning: /data/ahmedabad.osrm map file absent. Starting idle fallback to prevent crash loop."
          sleep infinity
        fi
    volumes:
      - osrm_data:/data
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5000 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  samraksha-net:
    driver: bridge

volumes:
  postgres_data:
  uploads:
  llama_data:
  osrm_data:
