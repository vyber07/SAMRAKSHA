# SAMRAKSHA - Police Crime Monitoring & Case Management Platform
# Full-stack application with frontend, API, database, and cache

services:

  # PostgreSQL Database with PostGIS for geospatial queries
  postgres:
    image: postgis/postgis:16-3.4
    container_name: samraksha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       samraksha
      POSTGRES_USER:     samraksha
      POSTGRES_PASSWORD: samraksha_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samraksha -d samraksha"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis Cache for session management and data caching
  redis:
    image: redis:7-alpine
    container_name: samraksha-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend - Crime monitoring and case management API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samraksha-api
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql+asyncpg://samraksha:samraksha_secret@postgres:5432/samraksha
      REDIS_URL:       redis://redis:6379/0
      ENVIRONMENT:     development
      DEMO_MODE:       "true"
      SECRET_KEY:      samraksha-super-secret-jwt-key-change-in-prod
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DEMO_SEED_PASSWORD: password123
      ADMIN_SEED_PASSWORD: password123
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # React Frontend - Material 3 design dashboard with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samraksha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - samraksha-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  samraksha-net:
    driver: bridge

volumes:
  postgres_data:
  uploads:
