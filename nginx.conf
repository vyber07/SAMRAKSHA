events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Use Docker's internal DNS resolver — resolves container names dynamically
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=100r/m;

    server {
        listen 80;
        server_name 15.207.20.122 _;

        # Security headers
        add_header X-Frame-Options        "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection       "1; mode=block";
        add_header Referrer-Policy        "strict-origin";

        # Block dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }

        # Auth login — strict rate limit
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket
        location /ws/ {
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # All backend API routes
        location ~ ^/(auth|cases|incident|fir|docs|patrol|map|cctv|assistant|legal|hotspot|analytics|admin|cctns|health)(/|$) {
            limit_req zone=api burst=20 nodelay;
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Vite HMR (dev)
        location /__vite_hmr {
            set $fe_upstream http://frontend:3000;
            proxy_pass         $fe_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # React frontend — everything else
        location / {
            set $fe_upstream http://frontend:3000;
            proxy_pass         $fe_upstream;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
